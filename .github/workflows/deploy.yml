# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Deploy Frontend + Backend (Docker)

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/novels/**"
      - "backend/novels/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Frontend (Vite) ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Build frontend
        working-directory: frontend/novels
        run: |
          npm ci
          npm run build

      # ---------- Backend (Spring Boot) ----------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      # gradlew 실행 권한 부여
      - name: Build backend
        working-directory: backend/novels
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # ---------- Prepare artifacts ----------
      - name: Prepare artifacts
        run: |
          set -e  # 에러 발생 시 즉시 종료
          mkdir -p artifacts/frontend artifacts/backend

          # frontend dist
          cp -r frontend/novels/dist/* artifacts/frontend/

          # backend jar -> app.jar (plain.jar 제외)
          JAR_PATH=$(ls backend/novels/build/libs/*.jar | grep -v -- '-plain\.jar' | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No runnable jar found in novels/backend/build/libs"
            ls -al backend/novels/build/libs || true
            exit 1
          fi

          cp "$JAR_PATH" artifacts/backend/app.jar
          cp backend/novels/Dockerfile artifacts/backend/Dockerfile
          cp backend/novels/docker-compose.yml artifacts/backend/docker-compose.yml

      # ---------- Deploy ----------
      - name: Install ssh + rsync
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      - name: Deploy (single SSH connection)
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          PORT: ${{ secrets.SERVER_PORT }}
          USER: ${{ secrets.SERVER_USER }}
          KEY: ${{ secrets.SERVER_SSH_RSA }}
          FE_DIR: ${{ secrets.DEPLOY_FRONTEND_DIR }}
          BE_DIR: ${{ secrets.DEPLOY_BACKEND_DIR }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$KEY" | tr -d '\r' > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          # host key 등록(StrictHostKeyChecking=yes로 쓰려면 필요)
          ssh-keyscan -p "$PORT" -t rsa "$HOST" >> ~/.ssh/known_hosts || true
          chmod 600 ~/.ssh/known_hosts

          # 멀티플렉싱 소켓 경로
          SOCK=~/.ssh/cm-%r@%h:%p

          # 공통 SSH 옵션(= 별칭 없이 사용)
          SSH_OPTS="-p $PORT -i ~/.ssh/id_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ControlMaster=auto -o ControlPersist=10m -o ControlPath=$SOCK"

          # 마스터 연결 1번 생성
          ssh $SSH_OPTS -MNf "$USER@$HOST"

          # rsync 2번(하지만 실제 연결은 마스터 재사용)
          rsync -az --delete -e "ssh $SSH_OPTS" artifacts/frontend/ "$USER@$HOST:$FE_DIR/"
          rsync -az --delete -e "ssh $SSH_OPTS" artifacts/backend/  "$USER@$HOST:$BE_DIR/"

          # 원격 배포(동일 마스터 재사용)
          ssh $SSH_OPTS "$USER@$HOST" "bash -lc '
            set -e
            cd \"$BE_DIR\"
            cat > .env <<EOF
            OPENAI_API_KEY=$OPENAI_API_KEY
            EOF
            chmod 600 .env
            docker compose up -d --build
            docker image prune -f
            sudo systemctl reload nginx
          '"

          # 마스터 연결 종료
          ssh $SSH_OPTS -O exit "$USER@$HOST"
